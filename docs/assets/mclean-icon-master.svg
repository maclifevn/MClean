<?xml version="1.0" encoding="UTF-8"?>
<!-- MClean app icon master (1024pt grid). Mark: Maclife logo polygons. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#DCF1FD"/>
    </linearGradient>
    <clipPath id="body"><rect x="100" y="100" width="824" height="824" rx="185.4"/></clipPath>
  </defs>
  <rect x="100" y="100" width="824" height="824" rx="185.4" fill="url(#bg)"/>
  <g clip-path="url(#body)">
    <!-- logo space 64x54.75 scaled 8.125x, offset x=252 y=271.6 (SVG top-left) -->
    <g transform="translate(252 271.6) scale(8.125)">
      <polygon points="13.77 17.46 1.29 50.15 12.29 50.15 27.56 26.78" fill="#12c3f4"/>
      <polygon points="43.12 2.94 27.56 26.78 62.16 50.15" fill="#39a4dc"/>
      <polygon points="27.56 26.78 12.29 50.15 62.16 50.15" fill="#0066ab"/>
    </g>
  </g>
  <rect x="101" y="101" width="822" height="822" rx="184.4" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="2"/>
</svg>
